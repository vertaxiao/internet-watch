<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetWatch - Network Device Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            color: #eee;
        }
        .subtitle {
            color: #888;
            margin-top: 5px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .stat-number {
            font-size: 3rem;
            font-weight: 700;
            color: #00d4ff;
        }
        .stat-label {
            color: #888;
            margin-top: 5px;
            font-size: 0.9rem;
        }
        .stat-card.online .stat-number {
            color: #00ff88;
        }
        .stat-card.offline .stat-number {
            color: #ff4757;
        }
        .chart-container {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            height: 300px;
        }
        .table-container {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a2a4a;
        }
        th {
            font-weight: 600;
            color: #888;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        tr:hover {
            background: #1f2545;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-online {
            background: #00ff88;
            color: #1a1a2e;
        }
        .status-offline {
            background: #ff4757;
            color: white;
        }
        .last-update {
            text-align: center;
            color: #888;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 30px;
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .refresh-btn:hover {
            background: #00a8cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 NetWatch</h1>
            <p class="subtitle">Network Device Monitoring Dashboard</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="total-count">0</div>
                <div class="stat-label">Total Devices</div>
            </div>
            <div class="stat-card online">
                <div class="stat-number" id="online-count">0</div>
                <div class="stat-label">Online</div>
            </div>
            <div class="stat-card offline">
                <div class="stat-number" id="offline-count">0</div>
                <div class="stat-label">Offline</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="historyChart"></canvas>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Device Name</th>
                        <th>IP Address</th>
                        <th>MAC Address</th>
                        <th>Hostname</th>
                        <th>First Seen</th>
                        <th>Last Seen</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="device-table">
                </tbody>
            </table>
        </div>

        <button class="refresh-btn" onclick="refreshData()">🔄 Refresh Now</button>
        <p class="last-update" id="last-update">Last updated: Never</p>
    </div>

    <script>
        let historyChart;

        function initChart() {
            const ctx = document.getElementById('historyChart').getContext('2d');
            historyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Online Devices',
                        data: [],
                        borderColor: '#34c759',
                        backgroundColor: 'rgba(52, 199, 89, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: 'Device Count Over Time'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });
        }

        function updateStats(devices) {
            const total = devices.length;
            const online = devices.filter(d => d.status === 'online').length;
            const offline = total - online;

            document.getElementById('total-count').textContent = total;
            document.getElementById('online-count').textContent = online;
            document.getElementById('offline-count').textContent = offline;
        }

        function updateTable(devices) {
            const tbody = document.getElementById('device-table');
            tbody.innerHTML = '';

            devices.forEach(device => {
                const row = document.createElement('tr');
                const statusClass = device.status === 'online' ? 'status-online' : 'status-offline';
                
                row.innerHTML = `
                    <td>${device.deviceName || '-'}</td>
                    <td>${device.ip}</td>
                    <td>${device.mac}</td>
                    <td>${device.hostname || '-'}</td>
                    <td>${formatDate(device.first_seen)}</td>
                    <td>${formatDate(device.last_seen)}</td>
                    <td><span class="status-badge ${statusClass}">${device.status}</span></td>
                `;
                tbody.appendChild(row);
            });
        }

        function updateChart(history) {
            if (!history || history.length === 0) return;

            const labels = history.map(h => {
                const date = new Date(h.timestamp);
                return date.toLocaleTimeString();
            });
            const data = history.map(h => h.online);

            historyChart.data.labels = labels;
            historyChart.data.datasets[0].data = data;
            historyChart.update();
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString();
        }

        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('last-update').textContent = 'Last updated: ' + now.toLocaleString();
        }

        async function refreshData() {
            try {
                const response = await fetch('/api/scan');
                const devices = await response.json();
                updateStats(devices);
                updateTable(devices);
                updateLastUpdate();

                const historyResponse = await fetch('/api/history');
                const history = await historyResponse.json();
                updateChart(history);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        // Initialize on page load
        initChart();
        refreshData();

        // Auto-refresh every 60 seconds
        setInterval(refreshData, 60000);
    </script>
</body>
</html>
